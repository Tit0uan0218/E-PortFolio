name: Sync AC from Google Sheets

on:
  schedule:
    # Run every 6 hours to pull latest spreadsheet updates automatically
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run sync script
        run: python sync_ac.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit and push if there are actual changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-sync AC from Google Sheets"
            git push
          else
            echo "No changes detected in AC data."
          fi
